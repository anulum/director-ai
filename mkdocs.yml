docs_dir: docs-site
strict: false
site_name: Director-AI
site_description: Real-time LLM hallucination guardrail — NLI + RAG fact-checking with token-level streaming halt
site_url: https://anulum.github.io/director-ai
site_author: Miroslav Šotek
repo_url: https://github.com/anulum/director-ai
repo_name: anulum/director-ai

copyright: "&copy; 1998–2026 Miroslav Šotek &middot; <a href='https://www.anulum.li'>anulum.li</a>"

theme:
  name: material
  icon:
    logo: material/shield-check
    repo: fontawesome/brands/github
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - announce.dismiss
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/anulum/director-ai
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/director-ai/
  generator: false
  version:
    provider: mike

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - mkdocs-jupyter:
      include: ["notebooks/*.ipynb"]
      execute: false
      allow_errors: false
      theme: dark
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            heading_level: 3
            members_order: source
            docstring_style: numpy
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - toc:
      permalink: true

