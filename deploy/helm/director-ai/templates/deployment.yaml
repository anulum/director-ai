# Director-Class AI — Helm Deployment Template
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "director-ai.fullname" . }}
  labels:
    {{- include "director-ai.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "director-ai.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "director-ai.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: director-ai
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.server.port }}
              protocol: TCP
          env:
            - name: DIRECTOR_PORT
              value: "{{ .Values.server.port }}"
            - name: DIRECTOR_WORKERS
              value: "{{ .Values.server.workers }}"
            - name: DIRECTOR_PROFILE
              value: "{{ .Values.server.profile }}"
            {{- if .Values.server.apiKeySecret }}
            - name: DIRECTOR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.server.apiKeySecret }}
                  key: api-key
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
            {{- if .Values.gpu.enabled }}
            {{- toYaml .Values.gpu.resources | nindent 12 }}
            {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
