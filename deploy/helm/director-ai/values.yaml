# Director-Class AI — Helm Values

replicaCount: 1

image:
  repository: ghcr.io/anulum/director-ai
  tag: ""  # defaults to Chart.appVersion
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

server:
  port: 8080
  workers: 2
  profile: "fast"
  apiKeySecret: ""  # k8s secret name containing DIRECTOR_API_KEY

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

gpu:
  enabled: false
  resources:
    limits:
      nvidia.com/gpu: 1

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilization: 70

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: director-ai.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

nodeSelector: {}
tolerations: []
affinity: {}

podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
