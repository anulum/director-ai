# Director-Class AI — Typos Configuration
[default.extend-words]
# Domain-specific terms that are not typos
nli = "nli"
otel = "otel"
qdrant = "qdrant"
grpc = "grpc"
deberta = "deberta"
onnx = "onnx"
hallucinated = "hallucinated"
ser = "ser"
inout = "inout"
nd = "nd"
rag = "rag"
hlt = "hlt"
FPR = "FPR"
fpr = "fpr"
ba = "ba"
Wice = "Wice"
arange = "arange"
thr = "thr"
aadd = "aadd"
hel = "hel"
fo = "fo"
strat = "strat"
Tru = "Tru"
# German word "Alle" (= "all") in multilingual injection adversarial pattern
Alle = "Alle"
# Substring match for "summarise/summarize" in task type detection
summar = "summar"
# zk-SNARK proving system names (Jens Groth 2016, Plonk; not typos).
# ``groth`` alone is the typos token after numeric split — must
# whitelist it so ``groth16`` passes.
groth = "groth"
groth16 = "groth16"
plonk = "plonk"
# Julia package name in tools/julia_tuner/Manifest.toml — not a plural typo
Missings = "Missings"
# German "Sie" (= formal "you") inside a multilingual injection
# adversarial pattern; not a typo for "Size/Side".
Sie = "Sie"
# ``anc`` / ``anc_a`` / ``anc_b`` are shorthand for "ancestor" in
# the ontology consistency checker; not a typo for "and".
anc = "anc"

[files]
extend-exclude = [
    "*.npz",
    "*.npy",
    "*.onnx",
    "*.pkl",
    "*.pt",
    "*.model",
    "backfire-kernel/target/",
    "benchmarks/models/*/tokenizer.json",
    # Julia dependency lockfile — regenerated by Pkg.resolve(),
    # hand-editing typos-flagged package names would break the lock.
    "tools/julia_tuner/Manifest.toml",
]
