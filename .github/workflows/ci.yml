name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install linters
        run: pip install "ruff>=0.5,<1"

      - name: Version consistency
        run: |
          V_TOML=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          V_INIT=$(python -c "import re, pathlib; print(re.search(r'__version__\s*=\s*\"([^\"]+)\"', pathlib.Path('src/director_ai/__init__.py').read_text()).group(1))")
          V_CFF=$(grep -m1 '^version:' CITATION.cff | sed 's/version: *"\{0,1\}\([^"]*\)"\{0,1\}/\1/')
          echo "pyproject.toml=$V_TOML  __init__.py=$V_INIT  CITATION.cff=$V_CFF"
          [ "$V_TOML" = "$V_INIT" ] && [ "$V_TOML" = "$V_CFF" ] || { echo "::error::Version mismatch"; exit 1; }

      - name: Check formatting (ruff)
        run: ruff format --check src/ tests/ examples/

      - name: Lint (ruff)
        run: ruff check src/ tests/ examples/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install type stubs
        run: pip install types-requests types-PyYAML

      - name: Run mypy
        run: mypy src/director_ai/ --ignore-missing-imports --check-untyped-defs

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=director_ai --cov-report=term-missing --cov-report=xml --cov-fail-under=90

      - name: Verify pure-Python import
        if: matrix.python-version == '3.12'
        run: python -c "import director_ai; assert director_ai.__version__"

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          files: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: coverage-report
          path: coverage.xml

  test-extras:
    name: Test extras (${{ matrix.extras }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        extras:
          - "dev,server"
          - "dev,server,ratelimit"
          - "dev,grpc"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install with extras
        run: pip install -e ".[${{ matrix.extras }}]"

      - name: Import smoke test
        run: python -c "import director_ai; assert director_ai.__version__"

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=director_ai \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-config=.coveragerc-extras

      - name: Upload extras coverage artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: coverage-extras-${{ matrix.extras }}
          path: coverage.xml

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        run: pip-audit --strict --desc on -r requirements.txt
        continue-on-error: true  # advisory — known torch CVEs

  sbom:
    name: SBOM Generation
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]" "cyclonedx-bom>=4.0,<5"

      - name: Generate SBOM
        run: cyclonedx-py environment -o sbom.json --of json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: sbom
          path: sbom.json

  fuzz:
    name: Fuzz (Hypothesis)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]" hypothesis>=6.0

      - name: Run property-based fuzz tests
        run: pytest tests/test_fuzz.py -v --hypothesis-seed=0
        env:
          HYPOTHESIS_MAX_EXAMPLES: "200"

  sast:
    name: SAST (Bandit + Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install "bandit[toml]"

      - name: Run Bandit
        run: bandit -r src/director_ai/ -c pyproject.toml

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d # v1
        continue-on-error: true
        with:
          config: p/python p/security-audit

  benchmark:
    name: Benchmark Regression
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run regression benchmarks
        run: python -m benchmarks.regression_suite

      - name: Upload results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: benchmark-results
          path: benchmarks/results/

  docker-smoke:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build image
        run: docker build -t director-ai:smoke .

      - name: Start container
        run: |
          docker run -d --name dai-smoke -p 8080:8080 \
            -e DIRECTOR_LLM_PROVIDER=mock \
            director-ai:smoke

      - name: Wait for health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/v1/health; then
              echo "Health check passed"
              exit 0
            fi
            sleep 1
          done
          echo "Health check timed out"
          docker logs dai-smoke
          exit 1

      - name: Verify endpoints
        run: |
          curl -sf http://localhost:8080/v1/health
          curl -sf http://localhost:8080/v1/source
          curl -sf http://localhost:8080/v1/metrics/prometheus

      - name: Stop container
        if: always()
        run: docker rm -f dai-smoke || true

      - name: Build GPU image (build-only)
        continue-on-error: true
        run: docker build -f Dockerfile.gpu -t director-ai:gpu-smoke .

  rust:
    name: Rust (backfire-kernel)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backfire-kernel
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db # v2
        with:
          workspaces: backfire-kernel

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

  discord-notify:
    name: Discord CI Notification
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, test-extras, security, fuzz, sast, benchmark, rust]
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - name: Resolve overall result
        id: result
        run: |
          RESULTS="${{ needs.lint.result }} ${{ needs.typecheck.result }} ${{ needs.test.result }} ${{ needs.test-extras.result }} ${{ needs.security.result }} ${{ needs.fuzz.result }} ${{ needs.sast.result }} ${{ needs.benchmark.result }} ${{ needs.rust.result }}"
          if echo "$RESULTS" | grep -qE "failure|cancelled"; then
            echo "passed=false" >> "$GITHUB_OUTPUT"
          else
            echo "passed=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          LINT: ${{ needs.lint.result }}
          TYPECHECK: ${{ needs.typecheck.result }}
          TEST: ${{ needs.test.result }}
          TEST_EXTRAS: ${{ needs.test-extras.result }}
          SECURITY: ${{ needs.security.result }}
          FUZZ: ${{ needs.fuzz.result }}
          SAST: ${{ needs.sast.result }}
          BENCHMARK: ${{ needs.benchmark.result }}
          RUST: ${{ needs.rust.result }}

      - name: Build job summary
        id: summary
        run: |
          icon() { case "$1" in success) echo "✅";; failure) echo "❌";; cancelled) echo "⏹️";; skipped) echo "⏭️";; *) echo "❓";; esac; }
          S="$(icon "$LINT") lint  $(icon "$TYPECHECK") typecheck  $(icon "$TEST") test  $(icon "$TEST_EXTRAS") extras  $(icon "$SECURITY") security  $(icon "$FUZZ") fuzz  $(icon "$SAST") sast  $(icon "$BENCHMARK") bench  $(icon "$RUST") rust"
          echo "jobs=$S" >> "$GITHUB_OUTPUT"
        env:
          LINT: ${{ needs.lint.result }}
          TYPECHECK: ${{ needs.typecheck.result }}
          TEST: ${{ needs.test.result }}
          TEST_EXTRAS: ${{ needs.test-extras.result }}
          SECURITY: ${{ needs.security.result }}
          FUZZ: ${{ needs.fuzz.result }}
          SAST: ${{ needs.sast.result }}
          BENCHMARK: ${{ needs.benchmark.result }}
          RUST: ${{ needs.rust.result }}

      - name: Post to Discord
        if: env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ "${{ steps.result.outputs.passed }}" = "true" ]; then
            COLOR=3066993  # green
            STATUS="passed"
          else
            COLOR=15158332  # red
            STATUS="FAILED"
          fi
          SHA="${GITHUB_SHA:0:7}"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          BRANCH="${GITHUB_REF_NAME}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          JOBS="${{ steps.summary.outputs.jobs }}"
          curl -sf -H "Content-Type: application/json" -d "{
            \"embeds\": [{
              \"title\": \"CI ${STATUS}\",
              \"color\": ${COLOR},
              \"url\": \"${RUN_URL}\",
              \"fields\": [
                {\"name\": \"Branch\", \"value\": \"\`${BRANCH}\`\", \"inline\": true},
                {\"name\": \"Commit\", \"value\": \"[\`${SHA}\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA})\", \"inline\": true},
                {\"name\": \"Run\", \"value\": \"[View](${RUN_URL})\", \"inline\": true},
                {\"name\": \"Jobs\", \"value\": \"${JOBS}\", \"inline\": false}
              ],
              \"footer\": {\"text\": \"${GITHUB_REPOSITORY}\", \"icon_url\": \"https://github.com/anulum.png\"},
              \"timestamp\": \"${TIMESTAMP}\"
            }]
          }" "$DISCORD_WEBHOOK_URL"
