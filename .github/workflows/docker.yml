name: Docker

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v3.4.0)"
        required: true

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/director-ai
  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}

jobs:
  docker-cpu:
    name: Build CPU Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}},value=${{ env.RELEASE_TAG }}
            type=raw,value=latest

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  docker-gpu:
    name: Build GPU Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}},suffix=-gpu,value=${{ env.RELEASE_TAG }}
            type=raw,value=gpu

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile.gpu
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  discord-notify:
    name: Discord Docker Notification
    runs-on: ubuntu-latest
    needs: [docker-cpu, docker-gpu]
    if: always() && needs.docker-cpu.result == 'success'
    steps:
      - name: Post to Discord
        if: env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          curl -sf -H "Content-Type: application/json" -d "{
            \"embeds\": [{
              \"title\": \"Docker images published\",
              \"color\": 3447003,
              \"fields\": [
                {\"name\": \"CPU\", \"value\": \"\`ghcr.io/anulum/director-ai:${VERSION}\`\\n\`ghcr.io/anulum/director-ai:latest\`\", \"inline\": true},
                {\"name\": \"GPU\", \"value\": \"\`ghcr.io/anulum/director-ai:${VERSION}-gpu\`\\n\`ghcr.io/anulum/director-ai:gpu\`\", \"inline\": true},
                {\"name\": \"Pull\", \"value\": \"\`\`\`\\ndocker pull ghcr.io/anulum/director-ai:latest\\n\`\`\`\", \"inline\": false}
              ],
              \"footer\": {\"text\": \"${GITHUB_REPOSITORY}\", \"icon_url\": \"https://github.com/anulum.png\"},
              \"timestamp\": \"${TIMESTAMP}\"
            }]
          }" "$DISCORD_WEBHOOK_URL"
