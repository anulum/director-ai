name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install 'build==1.4.0' 'twine==6.2.0' 'cyclonedx-bom==7.2.2'

      - name: Build sdist and wheel
        run: python -m build

      - name: Generate SBOM
        run: cyclonedx-py environment -o sbom.json --output-format json

      - name: Extract changelog for this tag
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          awk "/^## \[?${VERSION}/,/^## \[?[0-9]/" CHANGELOG.md \
            | head -n -1 > /tmp/release_notes.md
          echo "notes_file=/tmp/release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          body_path: ${{ steps.changelog.outputs.notes_file }}
          generate_release_notes: false
          files: |
            dist/*.tar.gz
            dist/*.whl
            sbom.json

  publish:
    name: Publish to PyPI
    needs: release
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          pip install 'build==1.4.0'
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
