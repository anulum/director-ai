name: Build & Publish Rust Wheels

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-wheels:
    name: Wheels (${{ matrix.os }}, ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64
          - os: macos-latest
            target: x86_64
          - os: macos-latest
            target: aarch64
          - os: windows-latest
            target: x64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - uses: goto-bus-stop/setup-zig@abea47f85e598557f500fa1fd2ab7464fcb39406 # v2.2.1
        if: matrix.target == 'aarch64' && runner.os == 'Linux'

      - name: Build wheels
        uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad # v1.50.1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --interpreter python3.12
          manylinux: auto
          working-directory: backfire-kernel/crates/backfire-ffi

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: backfire-kernel/crates/backfire-ffi/dist/

  build-wasm:
    name: WASM Edge Runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack@0.13.1 --locked

      - name: Build WASM package
        run: wasm-pack build --target web --release --out-dir pkg
        working-directory: backfire-kernel/crates/backfire-wasm

      - name: Verify output
        run: |
          test -f backfire-kernel/crates/backfire-wasm/pkg/backfire_wasm_bg.wasm
          test -f backfire-kernel/crates/backfire-wasm/pkg/backfire_wasm.js
          ls -lh backfire-kernel/crates/backfire-wasm/pkg/

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wasm-edge-runtime
          path: backfire-kernel/crates/backfire-wasm/pkg/

  build-sdist:
    name: Source Distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build sdist
        uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad # v1.50.1
        with:
          command: sdist
          args: --out dist
          working-directory: backfire-kernel/crates/backfire-ffi

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wheels-sdist
          path: backfire-kernel/crates/backfire-ffi/dist/

  publish:
    name: Publish backfire-kernel
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Check if version already published
        id: check
        run: |
          VERSION=$(ls dist/*.tar.gz | head -1 | sed 's/.*-\(.*\)\.tar\.gz/\1/')
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' "https://pypi.org/pypi/backfire-kernel/${VERSION}/json")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "exists=$( [ "$STATUS" = "200" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

      - name: Publish to PyPI
        if: steps.check.outputs.exists != 'true'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
