name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v3.4.0)"
        required: true

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}

jobs:
  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build==1.4.0 twine==6.2.0 cyclonedx-bom==7.2.2

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distribution
        run: twine check dist/*

      - name: Generate SBOM
        run: cyclonedx-py environment -o sbom.json --of json

      - name: Upload dist
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: dist
          path: dist/

      - name: Upload SBOM
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: sbom
          path: sbom.json

  sign:
    name: Sigstore Sign
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Download dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/

      - name: Sign with Sigstore
        uses: sigstore/gh-action-sigstore-python@04cffa1d795717b140764e8b640de88853c92acc # v3.3.0
        with:
          inputs: dist/*

      - name: Upload signatures
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: sigstore
          path: |
            dist/*.sigstore.json

  provenance:
    name: SLSA Provenance
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
    steps:
      - name: Download dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/

      - name: Generate provenance attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/*

  publish:
    name: Publish
    needs: [build, sign]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0

  attach-artifacts:
    name: Attach SBOM + Signatures to Release
    needs: [build, sign]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download SBOM artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sbom

      - name: Download Sigstore signatures
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sigstore
          path: sigstore/

      - name: Attach to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$RELEASE_TAG" sbom.json --clobber
          for sig in sigstore/*.sigstore.json; do
            [ -f "$sig" ] && gh release upload "$RELEASE_TAG" "$sig" --clobber
          done

  discord-announce:
    name: Discord Release Announcement
    runs-on: ubuntu-latest
    needs: [publish, attach-artifacts]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Extract changelog bullets
        id: changelog
        run: |
          VERSION="${RELEASE_TAG#v}"
          BULLETS=$(sed -n "/^## \[${VERSION}\]/,/^## \[/{/^## \[${VERSION}\]/d;/^## \[/d;/^$/d;p;}" CHANGELOG.md \
            | grep -E '^\s*-' | head -5 | sed 's/^ *- *//' | jq -Rsc 'split("\n") | map(select(length>0))')
          echo "bullets=${BULLETS}" >> "$GITHUB_OUTPUT"

      - name: Post to Discord
        if: env.DISCORD_ANNOUNCE_WEBHOOK != ''
        env:
          DISCORD_ANNOUNCE_WEBHOOK: ${{ secrets.DISCORD_ANNOUNCE_WEBHOOK }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          RELEASE_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}"
          BULLETS='${{ steps.changelog.outputs.bullets }}'
          DESC=$(echo "$BULLETS" | jq -r 'map("- " + .) | join("\n")' 2>/dev/null || echo "See release notes.")
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          curl -sf -H "Content-Type: application/json" -d "{
            \"embeds\": [{
              \"title\": \"Director-AI v${VERSION} released\",
              \"description\": $(echo "$DESC" | jq -Rs .),
              \"color\": 5793266,
              \"url\": \"${RELEASE_URL}\",
              \"fields\": [
                {\"name\": \"Install\", \"value\": \"\`\`\`\\npip install director-ai==${VERSION}\\n\`\`\`\", \"inline\": false},
                {\"name\": \"Links\", \"value\": \"[PyPI](https://pypi.org/project/director-ai/${VERSION}/) · [Release](${RELEASE_URL}) · [Docs](https://anulum.github.io/director-ai/) · [Docker](https://ghcr.io/anulum/director-ai)\", \"inline\": false}
              ],
              \"footer\": {\"text\": \"${GITHUB_REPOSITORY}\", \"icon_url\": \"https://github.com/anulum.png\"},
              \"timestamp\": \"${TIMESTAMP}\"
            }]
          }" "$DISCORD_ANNOUNCE_WEBHOOK"
