name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine "cyclonedx-bom>=4.0,<5"

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distribution
        run: twine check dist/*

      - name: Generate SBOM
        run: cyclonedx-py environment -o sbom.json --of json

      - name: Upload dist
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.json

  publish:
    name: Publish
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  attach-sbom:
    name: Attach SBOM to Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download SBOM artifact
        uses: actions/download-artifact@v8
        with:
          name: sbom

      - name: Attach to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" sbom.json --clobber

  discord-announce:
    name: Discord Release Announcement
    runs-on: ubuntu-latest
    needs: [publish, attach-sbom]
    steps:
      - uses: actions/checkout@v6

      - name: Extract changelog bullets
        id: changelog
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          BULLETS=$(sed -n "/^## \[${VERSION}\]/,/^## \[/{/^## \[${VERSION}\]/d;/^## \[/d;/^$/d;p;}" CHANGELOG.md \
            | grep -E '^\s*-' | head -3 | sed 's/^ *- *//' | jq -Rsc 'split("\n") | map(select(length>0))')
          echo "bullets=${BULLETS}" >> "$GITHUB_OUTPUT"

      - name: Post to Discord
        if: env.DISCORD_ANNOUNCE_WEBHOOK != ''
        env:
          DISCORD_ANNOUNCE_WEBHOOK: ${{ secrets.DISCORD_ANNOUNCE_WEBHOOK }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          RELEASE_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${{ github.event.release.tag_name }}"
          BULLETS='${{ steps.changelog.outputs.bullets }}'
          DESC=$(echo "$BULLETS" | jq -r 'map("- " + .) | join("\n")' 2>/dev/null || echo "See release notes.")
          curl -sf -H "Content-Type: application/json" -d "{
            \"embeds\": [{
              \"title\": \"Director-AI v${VERSION} released\",
              \"description\": $(echo "$DESC" | jq -Rs .),
              \"color\": 5793266,
              \"url\": \"${RELEASE_URL}\",
              \"fields\": [
                {\"name\": \"Install\", \"value\": \"\`\`\`\\npip install director-ai==${VERSION}\\n\`\`\`\", \"inline\": false},
                {\"name\": \"Links\", \"value\": \"[PyPI](https://pypi.org/project/director-ai/${VERSION}/) · [Release](${RELEASE_URL}) · [Docs](https://anulum.github.io/director-ai/)\", \"inline\": false}
              ],
              \"footer\": {\"text\": \"${GITHUB_REPOSITORY}\"}
            }]
          }" "$DISCORD_ANNOUNCE_WEBHOOK"
