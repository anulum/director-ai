name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine "cyclonedx-bom>=4.0,<5"

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distribution
        run: twine check dist/*

      - name: Generate SBOM
        run: cyclonedx-py environment -o sbom.json --of json

      - name: Upload dist
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: dist
          path: dist/

      - name: Upload SBOM
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: sbom
          path: sbom.json

  publish:
    name: Publish
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download dist
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0

  attach-sbom:
    name: Attach SBOM to Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download SBOM artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8
        with:
          name: sbom

      - name: Attach to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" sbom.json --clobber

  discord-announce:
    name: Discord Release Announcement
    runs-on: ubuntu-latest
    needs: [publish, attach-sbom]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Extract changelog bullets
        id: changelog
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          BULLETS=$(sed -n "/^## \[${VERSION}\]/,/^## \[/{/^## \[${VERSION}\]/d;/^## \[/d;/^$/d;p;}" CHANGELOG.md \
            | grep -E '^\s*-' | head -5 | sed 's/^ *- *//' | jq -Rsc 'split("\n") | map(select(length>0))')
          echo "bullets=${BULLETS}" >> "$GITHUB_OUTPUT"

      - name: Post to Discord
        if: env.DISCORD_ANNOUNCE_WEBHOOK != ''
        env:
          DISCORD_ANNOUNCE_WEBHOOK: ${{ secrets.DISCORD_ANNOUNCE_WEBHOOK }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          RELEASE_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${{ github.event.release.tag_name }}"
          BULLETS='${{ steps.changelog.outputs.bullets }}'
          DESC=$(echo "$BULLETS" | jq -r 'map("- " + .) | join("\n")' 2>/dev/null || echo "See release notes.")
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          curl -sf -H "Content-Type: application/json" -d "{
            \"embeds\": [{
              \"title\": \"Director-AI v${VERSION} released\",
              \"description\": $(echo "$DESC" | jq -Rs .),
              \"color\": 5793266,
              \"url\": \"${RELEASE_URL}\",
              \"fields\": [
                {\"name\": \"Install\", \"value\": \"\`\`\`\\npip install director-ai==${VERSION}\\n\`\`\`\", \"inline\": false},
                {\"name\": \"Links\", \"value\": \"[PyPI](https://pypi.org/project/director-ai/${VERSION}/) · [Release](${RELEASE_URL}) · [Docs](https://anulum.github.io/director-ai/) · [Docker](https://ghcr.io/anulum/director-ai)\", \"inline\": false}
              ],
              \"footer\": {\"text\": \"${GITHUB_REPOSITORY}\", \"icon_url\": \"https://github.com/anulum.png\"},
              \"timestamp\": \"${TIMESTAMP}\"
            }]
          }" "$DISCORD_ANNOUNCE_WEBHOOK"
